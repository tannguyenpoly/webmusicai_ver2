spring.application.name=webmusicai

# Kết nối SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;database=MusicAI_DB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect

# QUAN TRỌNG: Để update, không để create để tránh mất Seed Data
spring.jpa.hibernate.ddl-auto=update 
spring.jpa.show-sql=true