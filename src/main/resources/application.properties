spring.application.name=webmusicai

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=MusicAI_DB;encrypt=true;trustServerCertificate=true;
spring.datasource.username=${DB_USERNAME:dtbmusic}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


# If JWT_SECRET is blank, a random key is generated at startup (safe and convenient
# for local demo, but all sessions are invalid after restart).
jwt.secret=${JWT_SECRET:}
jwt.expiration=86400000

colab.music-api.url=${COLAB_MUSIC_API_URL:https://upstroke-strut-buggy.ngrok-free.dev/generate-music}

spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=30000
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile

# Demo runtime settings
app.cookie.secure=${COOKIE_SECURE:false}
app.websocket.allowed-origins=http://localhost:8080,https://*.trycloudflare.com,https://*.ngrok-free.app

# Store generated audio as files; SQL Server keeps only the short URL.
audio.storage.location=${AUDIO_STORAGE_LOCATION:./uploads/audio}
colab.music-api.connect-timeout-ms=10000
colab.music-api.read-timeout-ms=300000
music.jobs.core-pool-size=2
music.jobs.max-pool-size=4
music.jobs.queue-capacity=20
music.cleanup.recover-cron=0 */10 * * * *
music.cleanup.delete-cron=0 0 2 * * *

# Presence: a user is online while WebSocket is connected or heartbeat is recent.
presence.online-window-seconds=90

# Cấu hình SePay (Lấy từ biến môi trường, nếu không có sẽ dùng giá trị sau dấu colon :)
sepay.bank.code=${SEPAY_BANK_CODE:TPB}
sepay.bank.account-number=${SEPAY_BANK_ACCOUNT:YOUR_ACCOUNT_NUMBER}
sepay.bank.account-name=${SEPAY_BANK_NAME:YOUR_ACCOUNT_NAME}
sepay.webhook.api-key=${SEPAY_API_KEY:YOUR_WEBHOOK_API_KEY}

# VNPay sandbox. Keep credentials outside source control.
vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8080/api/orders/vnpay-return}
vnpay.tmn-code=${VNPAY_TMN_CODE:}
vnpay.secret-key=${VNPAY_SECRET_KEY:}


