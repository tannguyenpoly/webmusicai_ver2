<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
	<header th:fragment="header" class="navbar navbar-expand-lg shadow-sm sticky-top mb-4"
		style="background: var(--card-bg) !important; border-bottom: 1px solid var(--border-color); transition: background 0.3s, border-color 0.3s;">
		<div class="container">
			<a class="navbar-brand fw-bold d-flex align-items-center" href="/"
				style="color: var(--text-color) !important;"> <i class="ti ti-wand text-success me-2"
					style="filter: drop-shadow(0 0 5px #16a34a);"></i> <span
					style="color: var(--text-color) !important;">Music<span class="text-success">AI</span></span>
			</a>

			<div class="d-flex align-items-center ms-auto" v-cloak>
				<button @click="toggleTheme" class="theme-toggle-btn me-3" title="Chuyển chế độ sáng/tối">
					<i :class="isDarkMode ? 'ti ti-moon' : 'ti ti-sun'"></i>
				</button>

				<template v-if="currentUser !== null">
					<a href="/profile"
						class="btn px-3 py-1.5 rounded-pill me-2 small d-none d-md-flex align-items-center"
						style="background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); color: var(--text-color); transition: all 0.2s;"
						onmouseover="this.style.backgroundColor='rgba(255,255,255,0.1)'"
						onmouseout="this.style.backgroundColor='rgba(255,255,255,0.05)'" title="Xem hồ sơ">
						<img :src="formatAvatarUrl(userPhoto, currentUser)" class="rounded-circle me-2" style="width: 26px; height: 26px; border-radius: 50% !important; object-fit: cover !important; border: 2px solid #16a34a; box-shadow: 0 0 5px rgba(22, 163, 74, 0.3);" alt="Avatar" />
						<span class="fw-medium">{{ currentUser }}</span>
					</a>

					<a href="/favorites"
						class="btn px-3 py-1.5 rounded-pill me-2 small d-flex align-items-center text-decoration-none"
						style="background: rgba(22, 163, 74, 0.1); border: 1px solid rgba(22, 163, 74, 0.3); color: var(--text-color); transition: all 0.2s;"
						onmouseover="this.style.backgroundColor='rgba(22,163,74,0.2)'"
						onmouseout="this.style.backgroundColor='rgba(22,163,74,0.1)'" title="Bài hát yêu thích"> <i
							class="ti ti-heart text-success me-2"></i> <span class="fw-medium">Yêu
							thích</span>
					</a> <a v-if="isAdmin" href="/admin"
						class="btn px-3 py-1.5 rounded-pill me-2 small d-flex align-items-center text-decoration-none"
						style="background: rgba(220, 53, 69, 0.1); border: 1px solid rgba(220, 53, 69, 0.3); color: var(--text-color); transition: all 0.2s;"
						onmouseover="this.style.backgroundColor='rgba(220,53,69,0.2)'"
						onmouseout="this.style.backgroundColor='rgba(220,53,69,0.1)'" title="Trang quản trị"> <i
							class="ti ti-shield-lock text-danger me-2"></i> <span class="fw-medium">Quản trị</span>
					</a>

					<div class="px-3 py-1.5 rounded-pill me-3 small d-flex align-items-center"
						style="background: rgba(25, 135, 84, 0.1); border: 1px solid rgba(25, 135, 84, 0.3);">
						<i class="ti ti-coin text-warning me-2"></i> <span class="fw-bold text-warning">{{ userTokens
							}}</span>
					</div>

					<a href="/orders" class="nav-link d-flex align-items-center gap-2 me-3"
						:class="{ active: currentPage === '/orders' }"> <i class="ti ti-shopping-cart"
							style="font-size: 18px;"></i> <span>Nạp
							Token</span>
					</a>
					<button @click="handleLogout" class="btn btn-sm btn-outline-danger py-1 px-3"
						style="border-radius: 20px;">Đăng xuất</button>
				</template>

				<template v-if="currentUser === null">
					<a href="/register" class="btn btn-sm btn-register-sync px-3 py-1.5 me-2 text-decoration-none">Đăng
						ký</a> <a href="/login" class="btn btn-sm btn-success px-3 py-1.5 fw-medium"
						style="background: #16a34a; border: 0; border-radius: 10px;">Đăng
						nhập</a>
				</template>
			</div>
		</div>
	</header>
</body>

</html>
