<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="header" class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top mb-4"
        style="background: rgba(18, 18, 24, 0.8) !important; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.08);">
    <div class="container">
        <a class="navbar-brand fw-extrabold text-white d-flex align-items-center tracking-wide" href="/" style="letter-spacing: 0.5px;">
            <i class="fa-solid fa-wand-magic-sparkles text-success me-2" style="filter: drop-shadow(0 0 8px rgba(25, 135, 84, 0.8));"></i>
            <span>Music<span class="text-success">AI</span></span>
        </a>

        <div class="d-flex align-items-center ms-auto" v-cloak>

            <template v-if="currentUser !== null">
                <div class="text-white px-3 py-1.5 rounded-pill me-3 small d-flex align-items-center custom-badge"
                     style="background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.1);">
                    <i class="fa-solid fa-user-astronaut text-success me-2"></i>
                    <span>Tài khoản: <span class="text-success fw-bold">{{ currentUser }}</span></span>
                </div>

                <div class="text-white px-3 py-1.5 rounded-pill small me-3 d-flex align-items-center custom-badge"
                     style="background: rgba(25, 135, 84, 0.1); border: 1px solid rgba(25, 135, 84, 0.35); box-shadow: 0 0 10px rgba(25, 135, 84, 0.15);">
                    <i class="fa-solid fa-coins text-warning me-2"></i>
                    <span>Số dư: <span class="text-warning fw-bold">{{ userTokens }}</span></span>
                </div>

                <button @click="handleLogout" class="btn btn-sm btn-outline-danger px-3 py-1.5 fw-semibold"
                        style="border-radius: 20px; transition: all 0.3s ease;">
                    <i class="fa-solid fa-right-from-bracket me-1"></i> Đăng xuất
                </button>
            </template>

            <template v-if="currentUser === null">
                <div class="auth-buttons">
                    <a href="/register" class="btn btn-sm btn-outline-light px-3 py-1.5 fw-semibold me-2"
                       style="border-radius: 10px; border-color: rgba(255,255,255,0.3); transition: all 0.2s;">
                        <i class="fa-solid fa-user-plus me-1"></i> Đăng ký
                    </a>
                    <a href="/login" class="btn btn-sm btn-success px-3 py-1.5 fw-bold text-white border-0"
                       style="background: linear-gradient(135deg, #198754, #146c43); border-radius: 10px; box-shadow: 0 4px 12px rgba(25, 135, 84, 0.3); transition: all 0.2s;">
                        <i class="fa-solid fa-right-to-bracket me-1"></i> Đăng nhập
                    </a>
                </div>
            </template>

        </div>
    </div>
</header>
</body>
</html>
