<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="header" class="navbar navbar-expand-lg shadow-sm sticky-top mb-4"
        style="background: var(--card-bg) !important; border-bottom: 1px solid var(--border-color); transition: background 0.3s, border-color 0.3s;">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="/" style="color: var(--text-color) !important;">
            <i class="ti ti-wand text-success me-2" style="filter: drop-shadow(0 0 5px #16a34a);"></i>
            <span style="color: var(--text-color) !important;">Music<span class="text-success">AI</span></span>
        </a>

        <div class="d-flex align-items-center ms-auto" v-cloak>
            <button @click="toggleTheme" class="theme-toggle-btn me-3" title="Chuyển chế độ sáng/tối">
                <i :class="isDarkMode ? 'ti ti-moon' : 'ti ti-sun'"></i>
            </button>

            <template v-if="currentUser !== null">
                <button @click="openProfileModal" class="btn px-3 py-1.5 rounded-pill me-2 small d-none d-md-flex align-items-center"
                     style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-color); transition: all 0.2s;"
                     onmouseover="this.style.backgroundColor='rgba(255,255,255,0.1)'" onmouseout="this.style.backgroundColor='rgba(255,255,255,0.05)'" title="Xem hồ sơ">
                    <i class="ti ti-user-circle text-success me-2"></i>
                    <span class="fw-medium">{{ currentUser }}</span>
                </button>

                <div class="px-3 py-1.5 rounded-pill me-3 small d-flex align-items-center"
                     style="background: rgba(25, 135, 84, 0.1); border: 1px solid rgba(25, 135, 84, 0.3);">
                    <i class="ti ti-coin text-warning me-2"></i>
                    <span class="fw-bold text-warning">{{ userTokens }}</span>
                </div>

                <button @click="handleLogout" class="btn btn-sm btn-outline-danger py-1 px-3"
                        style="border-radius: 20px;">
                    Đăng xuất
                </button>
            </template>

            <template v-if="currentUser === null">
                <a href="/register"
                   class="btn btn-sm btn-register-sync px-3 py-1.5 me-2 text-decoration-none">Đăng ký</a>
                <a href="/login" class="btn btn-sm btn-success px-3 py-1.5 fw-medium"
                   style="background: #16a34a; border: 0; border-radius: 10px;">Đăng nhập</a>
            </template>
        </div>
    </div>
</header>
</body>
</html>
