<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout.html :: dynamic(~{:: #workspace-area})}">
<body>
<div id="workspace-area">

    <div class="card shadow-lg border-0">
        <div class="card-header bg-transparent border-0 d-flex justify-content-between align-items-center py-3">
            <div class="d-flex align-items-center gap-3">
                <a href="/" class="btn btn-sm action-btn-gray" title="Quay về trang chủ" style="border-radius: 50%; width: 34px; height: 34px; padding: 0;">
                    <i class="ti ti-arrow-left"></i>
                </a>
                <span class="fw-medium" style="font-size: 16px;">
                    <i class="ti ti-heart-filled text-danger me-2" style="font-size: 18px; vertical-align: -3px;"></i>Bài Hát Yêu Thích
                </span>
            </div>
            <span v-if="favoriteSongs.length > 0" class="badge px-2.5 py-1" style="background: rgba(220, 53, 69, 0.1); color: #dc3545; border: 1px solid rgba(220, 53, 69, 0.25); font-size: 11px; border-radius: 20px;">
                {{ favoriteSongs.length }} giai điệu
            </span>
        </div>
        <div class="card-body pt-1">
            <div v-if="!currentUser" class="text-center py-5 rounded sync-unauth-box">
                <i class="ti ti-lock text-muted-sync mb-2" style="font-size: 24px; display: block;"></i>
                <span class="text-muted-sync" style="font-size: 13px;">
                    Vui lòng <a href="/login" class="text-success fw-medium text-decoration-none">Đăng nhập</a> để xem danh sách yêu thích.
                </span>
            </div>

            <div v-else>
                <div v-if="isLoadingFavorites" class="text-center py-5">
                    <div class="spinner-border text-success" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2 text-muted-sync small">Đang tải danh sách...</p>
                </div>

                <div v-else-if="favoriteSongs.length === 0" class="text-center text-muted-sync py-5 small bg-transparent">
                    <i class="ti ti-mood-empty" style="font-size: 24px; display: block; margin-bottom: 8px;"></i>
                    Bạn chưa "thả tim" cho bài hát nào.
                </div>

                <ul v-else class="list-group list-group-flush custom-scrollbar" style="max-height: 600px; overflow-y: auto; margin: 0 -1.25rem; padding: 0 0.25rem;">
                    <li v-for="(song, index) in favoriteSongs" :key="song.id" class="list-group-item d-flex align-items-center justify-content-between p-3 bg-transparent border-bottom" style="border-color: var(--border-color) !important; border-radius: 12px; margin-bottom: 4px;">
                        <div class="d-flex align-items-center gap-3">
                            <span class="text-muted-sync fw-medium" style="width: 20px;">{{ index + 1 }}</span>
                            <div class="d-flex align-items-center justify-content-center" style="width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 6px;">
                                <i class="ti ti-music text-success"></i>
                            </div>
                            <div>
                                <div class="fw-medium text-truncate song-title-text" style="max-width: 450px;">{{ song.title }}</div>
                                <small class="text-muted-sync d-block text-truncate" style="font-size: 12px; max-width: 450px;">{{ song.prompt }}</small>
                            </div>
                        </div>

                        <div class="d-flex align-items-center gap-2">
                            <button @click="toggleLike(song)" class="btn btn-sm action-btn-red" title="Bỏ thích">
                                <i class="ti ti-heart-broken"></i>
                            </button>
                            <button @click="playTrack(song)" class="btn btn-sm action-btn-green" title="Phát bài hát này">
                                <i class="ti ti-player-play"></i>
                            </button>
                            <button @click="addToPlaylist(song)" class="btn btn-sm action-btn-gray" title="Thêm vào danh sách phát tạm">
                                <i class="ti ti-plus"></i>
                            </button>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </div>

</div>
</body>
</html>
