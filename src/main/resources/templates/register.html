<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MusicAI — Đăng ký thành viên</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet"/>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0f0d;
            padding: 1rem;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: #111612;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 2rem 2rem 1.75rem;
            position: relative;
        }

        .accent-bar {
            position: absolute;
            top: 0; left: 50%; transform: translateX(-50%);
            width: 60px; height: 3px;
            background: #16a34a;
            border-radius: 0 0 4px 4px;
        }

        .logo-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .logo-icon-wrap {
            width: 40px; height: 40px;
            background: rgba(22,163,74,0.12);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(22,163,74,0.25);
        }

        .logo-icon-wrap i { font-size: 20px; color: #16a34a; }

        .logo-title {
            font-size: 22px;
            font-weight: 500;
            color: #fff;
            letter-spacing: -0.3px;
        }

        .logo-title span { color: #16a34a; }

        .logo-subtitle {
            text-align: center;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 1.5rem;
        }

        .sonic-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(22,163,74,0.1);
            color: #4ade80;
            font-size: 11px;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid rgba(22,163,74,0.25);
            margin-bottom: 1.5rem;
        }

        .sonic-badge i { font-size: 12px; }

        .badge-center {
            display: flex;
            justify-content: center;
        }

        .waveform {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 16px;
            margin-left: 6px;
        }

        .waveform span {
            display: block;
            width: 3px;
            border-radius: 2px;
            background: #16a34a;
            animation: wave 1.2s ease-in-out infinite;
        }

        .waveform span:nth-child(1) { height: 5px;  animation-delay: 0s;    }
        .waveform span:nth-child(2) { height: 12px; animation-delay: 0.1s;  }
        .waveform span:nth-child(3) { height: 8px;  animation-delay: 0.2s;  }
        .waveform span:nth-child(4) { height: 16px; animation-delay: 0.3s;  }
        .waveform span:nth-child(5) { height: 6px;  animation-delay: 0.4s;  }
        .waveform span:nth-child(6) { height: 12px; animation-delay: 0.15s; }
        .waveform span:nth-child(7) { height: 5px;  animation-delay: 0.25s; }

        @keyframes wave {
            0%, 100% { transform: scaleY(1); opacity: 0.7; }
            50%       { transform: scaleY(1.6); opacity: 1; }
        }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .field-label {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.3px;
        }

        .status-dot {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
        }

        .dot-live {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #16a34a;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        .input-wrap {
            position: relative;
            margin-bottom: 1rem;
        }

        .input-wrap i {
            position: absolute;
            left: 12px; top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: rgba(255,255,255,0.3);
            pointer-events: none;
        }

        .input-wrap input {
            width: 100%;
            padding: 10px 12px 10px 38px;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            background: rgba(255,255,255,0.04);
            color: #fff;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .input-wrap input::placeholder { color: rgba(255,255,255,0.2); }

        .input-wrap input:focus {
            border-color: #16a34a;
            box-shadow: 0 0 0 3px rgba(22,163,74,0.15);
        }

        .btn-main {
            width: 100%;
            padding: 11px;
            background: #16a34a;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 0.25rem;
            transition: background 0.15s, transform 0.1s;
        }

        .btn-main:hover  { background: #15803d; }
        .btn-main:active { transform: scale(0.98); }
        .btn-main i      { font-size: 16px; }

        .footer-row {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 13px;
            color: rgba(255,255,255,0.35);
        }

        .footer-row a {
            color: #4ade80;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-row a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div id="app">
    <div class="login-card">
        <div class="accent-bar"></div>

        <div class="logo-row">
            <div class="logo-icon-wrap">
                <i class="ti ti-music"></i>
            </div>
            <span class="logo-title">Music<span>AI</span></span>
        </div>

        <p class="logo-subtitle">Tạo tài khoản để nhận token trải nghiệm miễn phí</p>

        <div class="badge-center">
            <div class="sonic-badge">
                <i class="ti ti-cpu"></i>
                Sonic-V4 engine
                <div class="waveform">
                    <span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span>
                </div>
            </div>
        </div>

        <form @submit.prevent="handleRegister" autocomplete="off">

            <div class="status-row">
                <label class="field-label" for="username">Tên đăng nhập (Username)</label>
                <div class="status-dot"><div class="dot-live"></div>trực tuyến</div>
            </div>
            <div class="input-wrap" style="margin-bottom:1rem">
                <i class="ti ti-user-astronaut"></i>
                <input id="username" type="text" v-model="registerForm.username" placeholder="Viết liền không dấu..." required />
            </div>

            <label class="field-label" for="fullname" style="display:block; margin-bottom:6px">Họ và tên (Fullname)</label>
            <div class="input-wrap" style="margin-bottom:1rem">
                <i class="ti ti-id-card"></i>
                <input id="fullname" type="text" v-model="registerForm.fullname" placeholder="Nhập họ và tên đầy đủ..." required />
            </div>

            <label class="field-label" for="email" style="display:block; margin-bottom:6px">Địa chỉ Email</label>
            <div class="input-wrap" style="margin-bottom:1rem">
                <i class="ti ti-mail"></i>
                <input id="email" type="email" v-model="registerForm.email" placeholder="username@gmail.com" required />
            </div>

            <label class="field-label" for="password" style="display:block; margin-bottom:6px">Mật khẩu</label>
            <div class="input-wrap" style="margin-bottom:1rem">
                <i class="ti ti-lock"></i>
                <input id="password" type="password" v-model="registerForm.password" placeholder="Tối thiểu 6 ký tự..." required />
            </div>

            <label class="field-label" for="confirmPassword" style="display:block; margin-bottom:6px">Xác nhận mật khẩu</label>
            <div class="input-wrap" style="margin-bottom:1.25rem">
                <i class="ti ti-shield-half"></i>
                <input id="confirmPassword" type="password" v-model="registerForm.confirmPassword" placeholder="Nhập lại mật khẩu..." required />
            </div>

            <button type="submit" class="btn-main">
                <i class="ti ti-user-plus"></i>
                Khởi tạo tài khoản
            </button>
        </form>

        <div class="footer-row">
            Đã có tài khoản rồi?
            <a href="/login">Đăng nhập tại đây <i class="ti ti-arrow-right" style="font-size:12px; vertical-align:-1px"></i></a>
        </div>
    </div>
</div>

<script src="/js/main.js"></script>
</body>
</html>
