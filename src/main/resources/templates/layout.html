<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="dynamic(view)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicAI - Sáng Tạo Giai Điều Việt</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        [v-cloak] {
            display: none !important;
        }

        /* ĐỊNH NGHĨA BIẾN MÀU SẮC TOÀN CỤC CHO KHUNG HỆ THỐNG */
        :root {
            /* Mặc định: DARK MODE (Trùng khớp mã màu trang Login sâu) */
            --bg-gradient: radial-gradient(circle at top right, #112211, #0a0f0d, #050508);
            --text-color: #ffffff;
            --card-bg: #111612;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-muted: rgba(255, 255, 255, 0.4);
            --table-hover: rgba(255, 255, 255, 0.02);
            --btn-outline-guest: rgba(255, 255, 255, 0.4);
            --btn-outline-guest-hover: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            /* Khi kích hoạt: LIGHT MODE */
            --bg-gradient: linear-gradient(135deg, #f4f7f5, #e8ebe9);
            --text-color: #1a1a1a;
            --card-bg: #ffffff;
            --border-color: rgba(0, 0, 0, 0.08);
            --text-muted: rgba(0, 0, 0, 0.5);
            --table-hover: rgba(0, 0, 0, 0.02);
            --btn-outline-guest: rgba(0, 0, 0, 0.4);
            --btn-outline-guest-hover: rgba(0, 0, 0, 0.05);
        }

        body {
            background: var(--bg-gradient) !important;
            color: var(--text-color) !important;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s ease, color 0.3s ease;
        }

        #app {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        main.container {
            flex: 1;
            position: relative;
            z-index: 1;
        }

        /* ĐỒNG BỘ CSS CARD THEO HỆ BIẾN ĐỘNG */
        .glass-panel,
        .card {
            background: var(--card-bg) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 20px !important;
            color: var(--text-color) !important;
            transition: background 0.3s, border-color 0.3s;
        }

        .text-muted-sync {
            color: var(--text-muted) !important;
        }

        /* Tùy biến thanh cuộn siêu mảnh */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(22, 163, 74, 0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #16a34a;
        }

        /* Đồng bộ thông báo SweetAlert2 theo giao diện */
        .swal2-popup {
            background: var(--card-bg) !important;
            color: var(--text-color) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 16px !important;
        }

        .swal2-title,
        .swal2-html-container {
            color: var(--text-color) !important;
        }

        /* Thiết kế nút công tắc chuyển chế độ hình tròn công nghệ */
        .theme-toggle-btn {
            background: rgba(22, 163, 74, 0.1);
            color: #16a34a;
            border: 1px solid rgba(22, 163, 74, 0.25);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .theme-toggle-btn:hover {
            background: #16a34a;
            color: #fff;
        }

        /* CSS Tùy biến cho nút Đăng ký thích ứng màu chữ theo Theme */
        .btn-register-sync {
            color: var(--text-color) !important;
            border: 1px solid var(--btn-outline-guest) !important;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-register-sync:hover {
            background-color: var(--btn-outline-guest-hover) !important;
        }

        /* ========================================================= */
        /* CSS ĐÃ ĐƯỢC CHUYỂN TỪ TRANG CON LÊN ĐỂ TRÁNH LỖI VUE      */
        /* ========================================================= */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-switch:checked { background-color: #16a34a !important; }

        .custom-theme-input {
            background-color: rgba(0, 0, 0, 0.2) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-color) !important;
            transition: all 0.3s ease;
        }
        [data-theme="light"] .custom-theme-input {
            background-color: rgba(0, 0, 0, 0.03) !important;
        }
        [data-theme="dark"] .custom-theme-input {
            background-color: rgba(255, 255, 255, 0.03) !important;
        }
        .custom-theme-input:focus {
            background-color: transparent !important;
            border-color: #16a34a !important;
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.15) !important;
            color: var(--text-color) !important;
        }

        .custom-search-addon {
            background-color: rgba(0, 0, 0, 0.2) !important;
            border: 1px solid var(--border-color) !important;
        }
        [data-theme="dark"] .custom-search-addon {
            background-color: rgba(255, 255, 255, 0.03) !important;
        }

        .sync-unauth-box, .sync-empty-player-box {
            background: rgba(0, 0, 0, 0.02) !important;
            border: 1px dashed var(--border-color) !important;
        }

        .btn-main-sync {
            background: #16a34a !important; color: #fff !important;
            font-size: 13px; font-weight: 500; border: none; border-radius: 10px;
        }
        .btn-main-sync:hover { background: #15803d !important; }

        .custom-sync-table {
            background-color: transparent !important;
            border-color: var(--border-color) !important;
        }
        .custom-sync-table thead tr {
            background-color: rgba(0, 0, 0, 0.2) !important;
            border-bottom: 2px solid var(--border-color) !important;
        }
        [data-theme="dark"] .custom-sync-table thead tr {
            background-color: rgba(255, 255, 255, 0.02) !important;
        }
        .custom-sync-table thead th {
            color: var(--text-muted) !important;
            border: none !important;
        }
        .custom-sync-table tbody tr,
        .custom-sync-table tbody td {
            background-color: transparent !important; 
            color: var(--text-color) !important;
            border-bottom: 1px solid var(--border-color) !important;
        }
        .custom-sync-table tbody tr:hover td {
            background-color: var(--table-hover) !important;
        }

        .song-title-text { color: var(--text-color) !important; }

        .action-btn-green {
            background: #16a34a !important; color: #ffffff !important;
            border: 1px solid #15803d !important; border-radius: 8px; padding: 6px 10px;
        }
        .action-btn-green:hover { background: #15803d !important; transform: scale(1.05); }

        .action-btn-gray {
            background: rgba(0, 0, 0, 0.06) !important;
            color: var(--text-color) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 8px; padding: 6px 10px;
        }
        [data-theme="dark"] .action-btn-gray {
            background: rgba(255, 255, 255, 0.08) !important;
        }
        .action-btn-gray:hover { transform: scale(1.05); }

        .custom-audio-player { filter: invert(0.85) hue-rotate(100deg); outline: none; }
        .song-link-hover:hover { color: #16a34a !important; text-decoration: underline !important; }
    </style>

    <script>
        const savedTheme = localStorage.getItem('music_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>

<body>
    <div id="app">
        <!-- Sử dụng Header từ fragment để tối ưu và dễ bảo trì -->
        <div th:replace="~{fragments/header :: header}"></div>

        <main class="container">
            <div th:replace="${view}"></div>
        </main>

        <div th:replace="~{fragments/footer :: footer}"></div>
        
        <!-- GIAO DIỆN MODAL HỒ SƠ CÁ NHÂN -->
        <div v-if="showProfileModal" v-cloak
             style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 9999; display: flex; align-items: center; justify-content: center;">
            
            <!-- Khung Modal (Ăn theo biến Dark/Light mode) -->
            <div class="card shadow-lg border-0" style="width: 420px; max-width: 90%; border-radius: 20px; overflow: hidden; animation: fadeIn 0.3s ease;">
                
                <div class="card-header bg-transparent d-flex justify-content-between align-items-center pt-4 pb-2 px-4" style="border-bottom: 1px solid var(--border-color);">
                    <h5 v-if="profileModalTab === 'info'" class="mb-0 fw-bold d-flex align-items-center" style="color: var(--text-color); font-size: 18px;">
                        <i class="ti ti-id text-success me-2" style="font-size: 24px;"></i> Thông tin tài khoản
                    </h5>
                    <h5 v-if="profileModalTab === 'password'" class="mb-0 fw-bold d-flex align-items-center" style="color: var(--text-color); font-size: 18px;">
                        <i class="ti ti-key text-success me-2" style="font-size: 24px;"></i> Đổi mật khẩu
                    </h5>
                    <button @click="closeProfileModal" class="btn text-muted-sync border-0 p-0" style="font-size: 24px; background: transparent; transition: 0.2s;" onmouseover="this.style.color='#dc3545'" onmouseout="this.style.color='var(--text-muted)'">&times;</button>
                </div>
                
                <div class="card-body px-4 pb-4 pt-2">
                    <!-- Tab Navigation -->
                    <ul class="nav nav-pills nav-fill mb-4" style="background: rgba(0,0,0,0.05); border-radius: 12px; padding: 4px;">
                        <li class="nav-item">
                            <a class="nav-link py-1" :class="{'active': profileModalTab === 'info'}" @click.prevent="profileModalTab = 'info'" href="#" style="border-radius: 10px; font-size: 13px; font-weight: 500;">Thông tin</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link py-1" :class="{'active': profileModalTab === 'password'}" @click.prevent="profileModalTab = 'password'" href="#" style="border-radius: 10px; font-size: 13px; font-weight: 500;">Mật khẩu</a>
                        </li>
                    </ul>

                    <!-- Tab Content: Profile Info -->
                    <div v-if="profileModalTab === 'info'">
                        <div class="mb-3">
                            <label class="form-label small fw-medium text-muted-sync">Họ và tên</label>
                            <input type="text" v-model="profileForm.fullname" class="form-control custom-theme-input py-2" placeholder="Nhập tên của bạn...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-medium text-muted-sync">Địa chỉ Email</label>
                            <input type="email" v-model="profileForm.email" class="form-control custom-theme-input py-2" placeholder="username@gmail.com">
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-medium text-muted-sync">Đường dẫn ảnh đại diện (URL)</label>
                            <input type="text" v-model="profileForm.photo" class="form-control custom-theme-input py-2" placeholder="https://...">
                        </div>
                    </div>

                    <!-- Tab Content: Change Password -->
                    <div v-if="profileModalTab === 'password'">
                        <div class="mb-3">
                            <label class="form-label small fw-medium text-muted-sync">Mật khẩu cũ</label>
                            <input type="password" v-model="changePasswordForm.oldPassword" class="form-control custom-theme-input py-2" placeholder="Nhập mật khẩu hiện tại">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-medium text-muted-sync">Mật khẩu mới</label>
                            <input type="password" v-model="changePasswordForm.newPassword" class="form-control custom-theme-input py-2" placeholder="Nhập mật khẩu mới">
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-medium text-muted-sync">Xác nhận mật khẩu mới</label>
                            <input type="password" v-model="changePasswordForm.confirmNewPassword" class="form-control custom-theme-input py-2" placeholder="Nhập lại mật khẩu mới">
                        </div>
                    </div>
                    
                    <div class="d-flex gap-2 mt-2">
                        <button @click="closeProfileModal" class="btn action-btn-gray flex-grow-1 py-2 fw-medium">Hủy bỏ</button>
                        <button v-if="profileModalTab === 'info'" @click="submitUpdateProfile" class="btn btn-main-sync flex-grow-1 py-2 fw-medium d-flex justify-content-center align-items-center">
                            <i class="ti ti-device-floppy me-2"></i> Lưu thay đổi
                        </button>
                        <button v-if="profileModalTab === 'password'" @click="submitChangePassword" class="btn btn-main-sync flex-grow-1 py-2 fw-medium d-flex justify-content-center align-items-center">
                            <i class="ti ti-lock-check me-2"></i> Xác nhận đổi
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div> 
    
    <script th:src="@{/js/main.js}"></script>
</body>

</html>
